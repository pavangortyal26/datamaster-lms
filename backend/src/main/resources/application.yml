spring:
  application:
    name: datamaster-lms
  profiles:
    active: dev
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate   # schema changes go through Flyway migrations, not Hibernate auto-DDL
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-env-vars}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.datamaster.lms: INFO
    org.springframework.security: WARN
